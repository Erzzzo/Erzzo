<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERZZO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #c8f264;
      --bg: #0c0c0c;
      --card-bg: #111;
      --border: #222;
      --text: #e8e8e8;
      --muted: #555;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; }

    header { padding: 3rem 3rem 0; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem, 12vw, 9rem); line-height: 0.9; color: #fff; letter-spacing: 0.02em; }
    .tagline { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-top: 0.75rem; margin-bottom: 2rem; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding: 0.75rem 0; font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .header-bar .hl { color: var(--accent); }

    main { padding: 2rem 3rem 4rem; }
    .section-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2px; background: var(--border); }

    .card { background: var(--card-bg); position: relative; overflow: hidden; cursor: pointer; }
    .thumb { width: 100%; aspect-ratio: 3/4; position: relative; overflow: hidden; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease, filter 0.4s ease; filter: grayscale(15%); }
    .card:hover .thumb img { transform: scale(1.04); filter: grayscale(0%); }
    .thumb::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s ease; }
    .card:hover .thumb::after { opacity: 1; }

    .dl-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2; opacity: 0; transition: opacity 0.3s ease; }
    .card:hover .dl-wrap { opacity: 1; }
    .dl-btn { background: var(--accent); color: #000; font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: 0.12em; padding: 0.65rem 2rem; text-decoration: none; display: inline-block; transition: background 0.15s; }
    .dl-btn:hover { background: #d8ff6a; }

    .card-info { padding: 0.9rem 1rem 1rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .card-row { display: flex; justify-content: space-between; align-items: baseline; }
    .card-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.08em; color: #fff; line-height: 1; }
    .card-size { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--accent); letter-spacing: 0.05em; }
    .card-date { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.08em; }
    .card-divider { height: 1px; background: var(--border); margin: 0.4rem 0; }
    .card-tag { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); border: 1px solid var(--border); display: inline-block; padding: 0.15rem 0.5rem; }

    footer { border-top: 1px solid var(--border); padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; }
    footer p { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: #333; letter-spacing: 0.08em; text-transform: uppercase; }
    footer .mark { color: var(--accent); }

    @media (max-width: 600px) { header, main, footer { padding-left: 1.25rem; padding-right: 1.25rem; } .logo { font-size: 5rem; } }
  </style>
</head>

  </div>
</header>
