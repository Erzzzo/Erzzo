<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Erzzo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }

    .site {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 0 3rem;
      border-bottom: 1px solid #1f1f1f;
      margin-bottom: 3rem;
    }

    .logo {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 1.5rem;
      font-family: 'DM Mono', monospace;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px;
      background: #1a1a1a;
      margin-bottom: 4rem;
    }

    .card {
      background: #0a0a0a;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }

    .card:hover { background: #111; }
    .card:hover .card-overlay { opacity: 1; }

    .thumb {
      width: 100%;
      aspect-ratio: 4/3;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
    }

    /* -- náhledový obrázek pokud existuje -- */
    .thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(200, 242, 100, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .dl-btn {
      background: #c8f264;
      color: #000;
      border: none;
      padding: 0.6rem 1.2rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s;
    }

    .dl-btn:hover { background: #d8ff70; }

    .card-info { padding: 1rem 1.25rem 1.25rem; }

    .card-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #e8e8e8;
      margin-bottom: 0.3rem;
    }

    .card-meta {
      font-size: 0.7rem;
      color: #444;
      font-family: 'DM Mono', monospace;
      display: flex;
      justify-content: space-between;
    }

    .card-tag {
      background: #1a1a1a;
      color: #666;
      font-size: 0.65rem;
      font-family: 'DM Mono', monospace;
      padding: 0.2rem 0.5rem;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-top: 0.5rem;
    }

    footer {
      border-top: 1px solid #1f1f1f;
      padding-top: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 2rem;
    }

    footer p {
      font-size: 0.75rem;
      color: #333;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="site">

    <nav>
      <div class="logo">Erzzo</div>
    </nav>

    <div class="section-label">— Moje práce</div>

    <div class="grid">

      <!-- KARTA 1 -->
      <div class="card">
        <div class="thumb" style="background:#0d1117">
          <span style="color:#c8f264;opacity:0.3">◈</span>
          <div class="card-overlay">
            <a class="dl-btn"
               href="https://drive.google.com/file/d/1aVCDJVl5tPmewRQNC-EqQNrTy-ztXeeX/view?usp=sharing"
               target="_blank" rel="noopener">↓ Stáhnout PSD</a>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title">Neon City Vol.1</div>
          <div class="card-meta"><span>2024</span><span>48 MB</span></div>
          <span class="card-tag">illustration</span>
        </div>
      </div>

      <!-- KARTA 2 -->
      <div class="card">
        <div class="thumb" style="background:#0f0d17">
          <span style="color:#a78bfa;opacity:0.3">◉</span>
          <div class="card-overlay">
            <a class="dl-btn"
               href="https://drive.google.com/file/d/1uK-MRbq5DnAPmCWoFkSc4MusBi_AHp6f/view?usp=sharing"
               target="_blank" rel="noopener">↓ Stáhnout PSD</a>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title">Void Portrait</div>
          <div class="card-meta"><span>2024</span><span>72 MB</span></div>
          <span class="card-tag">artwork</span>
        </div>
      </div>

      <!-- KARTA 3 -->
      <div class="card">
        <div class="thumb" style="background:#0d1410">
          <span style="color:#4ade80;opacity:0.25">⬡</span>
          <div class="card-overlay">
            <a class="dl-btn"
               href="https://drive.google.com/file/d/1jSbUdmZMqQ_bSZok7VsLGSPWZV842CgG/view?usp=sharing"
               target="_blank" rel="noopener">↓ Stáhnout PSD</a>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title">Forest Entity</div>
          <div class="card-meta"><span>2023</span><span>55 MB</span></div>
          <span class="card-tag">illustration</span>
        </div>
      </div>

    </div><!-- /grid -->

    <footer>
      <p>© 2025 Erzzo — všechna práva vyhrazena</p>
      <p style="color:#c8f264">✦ PSD Portfolio</p>
    </footer>

  </div>
</body>
</html>
